name: live-rag-e2e

# Live, secret-backed regression gate for the documentary chat and DMS flows.
# This intentionally does not run on pull_request because it needs production-like
# API keys and Supabase service-role access. Use manually before release, and let
# the nightly schedule catch drift in providers, corpus metadata, RPCs, and RAG.
on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

concurrency:
  group: live-rag-e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live-rag-e2e:
    name: live RAG + documentary E2E
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      CI: 'true'
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_CHAT_MODEL: gpt-5.5
      OPENAI_VERIFIER_MODEL: gpt-5.5
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      LLAMA_CLOUD_API_KEY: ${{ secrets.LLAMA_CLOUD_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || secrets.MISTRAL_APIKEY_OCR }}
      MISTRAL_APIKEY_OCR: ${{ secrets.MISTRAL_APIKEY_OCR }}
      RAG_OCR_ENABLED: ${{ vars.RAG_OCR_ENABLED || secrets.RAG_OCR_ENABLED }}
      E2E_ARTIFACT_DIR: /tmp/gemswell-e2e-artifacts
      E2E_SUMMARY_DIR: /tmp/gemswell-e2e-artifacts
      E2E_SERVER_MODE: start
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify required live secrets
        shell: bash
        run: |
          required=(
            NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_ANON_KEY
            SUPABASE_SERVICE_ROLE_KEY
            OPENAI_API_KEY
            COHERE_API_KEY
          )
          missing=0
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret or env: ${name}"
              missing=1
            fi
          done
          if [ -z "${GOOGLE_AI_API_KEY}" ] && [ -z "${GEMINI_API_KEY}" ]; then
            echo "::error::Missing required Gemini embedding secret: set GOOGLE_AI_API_KEY or GEMINI_API_KEY"
            missing=1
          fi
          exit "$missing"

      - name: Install dependencies
        run: npm ci

      - name: OpenAI quota health
        id: openai_health
        continue-on-error: true
        timeout-minutes: 5
        run: npm run eval:openai-health -- live-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Install Chromium for E2E
        id: install_chromium
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npx tsc --noEmit --pretty false

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Unit and invariant tests
        id: unit_tests
        continue-on-error: true
        run: npm test

      - name: OCR fallback smoke
        id: ocr_smoke
        continue-on-error: true
        timeout-minutes: 5
        run: npm run eval:ocr-smoke -- live-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Production build
        id: production_build
        continue-on-error: true
        run: npm run build

      - name: Smart document search eval
        id: smart_search_eval
        continue-on-error: true
        timeout-minutes: 30
        env:
          EVAL_SMART_SEARCH_PHASE_TIMEOUT_MS: '240000'
          SMART_SEARCH_EVAL_MODEL: ${{ steps.openai_health.outcome == 'success' && 'true' || 'false' }}
        run: npm run eval:smart-search -- live-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Retrieval eval
        id: retrieval_eval
        continue-on-error: true
        timeout-minutes: 30
        env:
          EVAL_RETRIEVAL_PHASE_TIMEOUT_MS: '240000'
        run: npm run eval:retrieval -- live-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Prompt behavior eval
        id: prompt_behavior_eval
        continue-on-error: true
        timeout-minutes: 30
        env:
          EVAL_PROMPT_BEHAVIOR_PHASE_TIMEOUT_MS: '300000'
          EVAL_PROMPT_BEHAVIOR_RETRIES: '2'
        run: npm run eval:prompt-behavior -- live-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Critical answer eval
        id: critical_answer_eval
        continue-on-error: true
        timeout-minutes: 45
        env:
          EVAL_ANSWERS_PHASE_TIMEOUT_MS: '420000'
        run: >
          npm run eval:answers -- live-${{ github.run_id }}-${{ github.run_attempt }}-critical
          --only mad-dec-capitalcall,cross-project-legal,mad-buenavista-conditions,mad-santander-bbva-bank-cost,named-absent-abstain,zero-ski,ambiguous-cost
          --concurrency 1

      - name: Governance eval
        id: governance_eval
        continue-on-error: true
        timeout-minutes: 10
        run: npm run eval:governance -- live-${{ github.run_id }}-${{ github.run_attempt }}-critical

      - name: Documentary browser E2E - chat/search
        id: document_chat_e2e
        continue-on-error: true
        timeout-minutes: 30
        env:
          E2E_ALLOW_SMART_MODEL_FALLBACK: ${{ steps.openai_health.outcome == 'failure' && 'true' || 'false' }}
        run: npm run e2e:doc-chat

      - name: Documentary browser E2E - ingest/governance
        id: document_ingest_e2e
        continue-on-error: true
        timeout-minutes: 45
        run: npm run e2e:doc-ingest

      - name: Summarize live evidence
        if: always()
        id: live_evidence_summary
        continue-on-error: true
        run: >
          npm run eval:live-summary --
          --label live-${{ github.run_id }}-${{ github.run_attempt }}
          --results-dir scripts/eval/results
          --e2e-dir /tmp/gemswell-e2e-artifacts
          --out /tmp/gemswell-e2e-artifacts/live-evidence-summary.json

      - name: Upload eval and E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: live-rag-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            scripts/eval/results/*.json
            /tmp/gemswell-e2e-artifacts/**

      - name: Validate live gate outcomes
        if: always()
        shell: bash
        env:
          OPENAI_HEALTH_OUTCOME: ${{ steps.openai_health.outcome }}
          INSTALL_CHROMIUM_OUTCOME: ${{ steps.install_chromium.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          UNIT_TESTS_OUTCOME: ${{ steps.unit_tests.outcome }}
          OCR_SMOKE_OUTCOME: ${{ steps.ocr_smoke.outcome }}
          PRODUCTION_BUILD_OUTCOME: ${{ steps.production_build.outcome }}
          SMART_SEARCH_EVAL_OUTCOME: ${{ steps.smart_search_eval.outcome }}
          RETRIEVAL_EVAL_OUTCOME: ${{ steps.retrieval_eval.outcome }}
          PROMPT_BEHAVIOR_EVAL_OUTCOME: ${{ steps.prompt_behavior_eval.outcome }}
          CRITICAL_ANSWER_EVAL_OUTCOME: ${{ steps.critical_answer_eval.outcome }}
          GOVERNANCE_EVAL_OUTCOME: ${{ steps.governance_eval.outcome }}
          DOCUMENT_CHAT_E2E_OUTCOME: ${{ steps.document_chat_e2e.outcome }}
          DOCUMENT_INGEST_E2E_OUTCOME: ${{ steps.document_ingest_e2e.outcome }}
        run: |
          failed=0
          check() {
            local label="$1"
            local outcome="$2"
            if [ "$outcome" != "success" ]; then
              echo "::error::${label} outcome=${outcome}"
              failed=1
            fi
          }

          check "OpenAI quota health" "$OPENAI_HEALTH_OUTCOME"
          check "Install Chromium for E2E" "$INSTALL_CHROMIUM_OUTCOME"
          check "Typecheck" "$TYPECHECK_OUTCOME"
          check "Lint" "$LINT_OUTCOME"
          check "Unit and invariant tests" "$UNIT_TESTS_OUTCOME"
          check "OCR fallback smoke" "$OCR_SMOKE_OUTCOME"
          check "Production build" "$PRODUCTION_BUILD_OUTCOME"
          check "Smart document search eval" "$SMART_SEARCH_EVAL_OUTCOME"
          check "Retrieval eval" "$RETRIEVAL_EVAL_OUTCOME"
          check "Prompt behavior eval" "$PROMPT_BEHAVIOR_EVAL_OUTCOME"
          check "Critical answer eval" "$CRITICAL_ANSWER_EVAL_OUTCOME"
          check "Governance eval" "$GOVERNANCE_EVAL_OUTCOME"
          check "Documentary browser E2E - chat/search" "$DOCUMENT_CHAT_E2E_OUTCOME"
          check "Documentary browser E2E - ingest/governance" "$DOCUMENT_INGEST_E2E_OUTCOME"

          if [ "$failed" -ne 0 ]; then
            echo "::error::live-rag-e2e collected available artifacts, but one or more required release gates failed."
          fi
          exit "$failed"
